services:
  - type: web
    name: phantomai
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: MISTRAL_API_KEY
        sync: false
      - key: NODE_VERSION
        value: 16
      - key: PORT
        value: 10000
    healthCheckPath: /api/health
    autoDeploy: true